<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Showfile snapshot diff</title>
<style>
  :root {
    --bg: #16181d; --panel: #1e2128; --edge: #2f333c;
    --fg: #e6e8ec; --dim: #878d99;
    --add: #4ec9776; --add-fg: #6fd08c; --rm-fg: #e8737f; --ch-fg: #d7a45f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  header {
    padding: 18px 24px; border-bottom: 1px solid var(--edge);
    display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;
  }
  h1 { font-size: 16px; font-weight: 600; margin: 0 auto 0 0; letter-spacing: .01em; }
  .slot { display: flex; flex-direction: column; gap: 5px; }
  .slot label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .07em; }
  .drop {
    border: 1px dashed var(--edge); border-radius: 6px; padding: 9px 13px;
    min-width: 250px; cursor: pointer; background: var(--panel);
    color: var(--dim); font-size: 13px; transition: border-color .12s, color .12s;
  }
  .drop.filled { color: var(--fg); border-style: solid; }
  .drop.over { border-color: var(--add-fg); color: var(--add-fg); }
  .drop .stamp { display: block; font-size: 11px; color: var(--dim); margin-top: 2px; }
  input[type=file] { display: none; }

  #bar {
    padding: 10px 24px; border-bottom: 1px solid var(--edge);
    display: none; gap: 18px; align-items: center; font-size: 13px;
  }
  #bar.on { display: flex; }
  .tally b { font-weight: 600; }
  .tally .a { color: var(--add-fg); } .tally .r { color: var(--rm-fg); } .tally .c { color: var(--ch-fg); }
  #bar label { color: var(--dim); display: flex; gap: 6px; align-items: center; cursor: pointer; }

  main { padding: 20px 24px 60px; }
  .node { margin: 2px 0; }
  .row {
    display: flex; gap: 9px; align-items: baseline; padding: 3px 8px;
    border-radius: 4px; border-left: 2px solid transparent;
  }
  .row:hover { background: #22262e; }
  .kids { margin-left: 22px; border-left: 1px solid var(--edge); padding-left: 10px; }
  .sigil { width: 11px; flex: none; font-weight: 700; font-family: ui-monospace, monospace; }
  .added   > .row { border-left-color: var(--add-fg); } .added   > .row .sigil { color: var(--add-fg); }
  .removed > .row { border-left-color: var(--rm-fg); }  .removed > .row .sigil { color: var(--rm-fg); }
  .changed > .row { border-left-color: var(--ch-fg); }  .changed > .row .sigil { color: var(--ch-fg); }
  .label { font-weight: 500; }
  .detail { color: var(--dim); font-size: 12px; }
  /* One flex row per change rather than a 4-column grid: in a grid every arrow
     is pushed out to the widest `from` value on the entity, so a short
     `trackCount: 3` sat next to an arrow aligned to a long running-order
     string. Only the field-name column stays aligned. */
  .fields { margin: 3px 0 6px 42px; }
  .fields .chg { display: flex; gap: 9px; align-items: baseline; padding: 1px 0; }
  .fields .k { color: var(--dim); font-size: 12px; min-width: 96px; flex: none; text-align: right; }
  /* justify-self keeps a chip the width of its own text — without it the grid
     stretches every value to the widest row, and `3` renders as a long bar. */
  .fields .v { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; padding: 0 4px; border-radius: 3px; justify-self: start; }
  .fields .from { color: var(--rm-fg); background: #3a1f24; }
  .fields .to   { color: var(--add-fg); background: #1c3326; }
  .fields .arrow { color: var(--dim); }
  .empty, .hint { color: var(--dim); text-align: center; padding: 60px 20px; }
  .err { color: var(--rm-fg); padding: 14px 24px; }
</style>
</head>
<body>

<header>
  <h1>Showfile snapshot diff</h1>
  <div class="slot">
    <label>Before</label>
    <div class="drop" id="dropA" data-slot="a">Choose or drop a snapshot…</div>
    <input type="file" id="fileA" accept=".json,application/json">
  </div>
  <div class="slot">
    <label>After</label>
    <div class="drop" id="dropB" data-slot="b">Choose or drop a snapshot…</div>
    <input type="file" id="fileB" accept=".json,application/json">
  </div>
</header>

<div id="bar">
  <span class="tally" id="tally"></span>
  <label><input type="checkbox" id="ctx"> show unchanged context</label>
</div>

<div class="err" id="err" hidden></div>
<main id="out"><p class="hint">Pick two snapshots to compare.</p></main>

<script src="diff.js"></script>
<script>
var snaps = { a: null, b: null };

function wire(dropId, inputId, slot) {
  var drop = document.getElementById(dropId), input = document.getElementById(inputId);
  drop.addEventListener('click', function () { input.click(); });
  input.addEventListener('change', function () { if (input.files[0]) load(input.files[0], slot, drop); });
  drop.addEventListener('dragover', function (e) { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', function () { drop.classList.remove('over'); });
  drop.addEventListener('drop', function (e) {
    e.preventDefault(); drop.classList.remove('over');
    if (e.dataTransfer.files[0]) load(e.dataTransfer.files[0], slot, drop);
  });
}

function load(file, slot, drop) {
  var reader = new FileReader();
  reader.onload = function () {
    try {
      var data = JSON.parse(reader.result);
      // A v1 log has a top-level `transport`, not `transports`; its tracks are
      // inline rather than referenced, so the entity matching here cannot line
      // up. Say so rather than rendering a misleading all-changed diff.
      if (data.schemaVersion !== 4) {
        throw new Error('schema v' + data.schemaVersion + ' is not comparable — this viewer reads v4');
      }
      snaps[slot] = data;
      drop.classList.add('filled');
      drop.innerHTML = esc(file.name) + '<span class="stamp">' +
        esc(data.project || '?') + ' · ' + esc(data.capturedAt || '') + '</span>';
      render();
    } catch (e) { fail(file.name + ': ' + e.message); }
  };
  reader.readAsText(file);
}

function esc(s) {
  return String(s === null || s === undefined ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function fail(msg) {
  var el = document.getElementById('err');
  el.hidden = false; el.textContent = msg;
}

var SIGIL = { added: '+', removed: '−', changed: '~' };

function renderNode(node) {
  var html = '<div class="node ' + node.kind + '">';
  html += '<div class="row"><span class="sigil">' + SIGIL[node.kind] + '</span>';
  html += '<span class="label">' + esc(node.label) + '</span>';
  if (node.detail) html += '<span class="detail">' + esc(node.detail) + '</span>';
  html += '</div>';

  if (node.changes && node.changes.length) {
    html += '<div class="fields">';
    node.changes.forEach(function (c) {
      html += '<div class="chg"><span class="k">' + esc(c.field) + '</span>' +
              '<span class="v from">' + esc(fmt(c.from)) + '</span>' +
              '<span class="arrow">→</span>' +
              '<span class="v to">' + esc(fmt(c.to)) + '</span></div>';
    });
    html += '</div>';
  }
  if (node.children && node.children.length) {
    html += '<div class="kids">' + node.children.map(renderNode).join('') + '</div>';
  }
  return html + '</div>';
}

function render() {
  if (!snaps.a || !snaps.b) return;
  document.getElementById('err').hidden = true;

  var result = diffSnapshots(snaps.a, snaps.b);
  var out = document.getElementById('out');
  var bar = document.getElementById('bar');
  var c = result.counts;

  bar.classList.add('on');
  document.getElementById('tally').innerHTML =
    '<span class="a"><b>' + c.added + '</b> added</span> &nbsp; ' +
    '<span class="r"><b>' + c.removed + '</b> removed</span> &nbsp; ' +
    '<span class="c"><b>' + c.changed + '</b> changed</span>';

  if (!result.nodes.length) {
    out.innerHTML = '<p class="empty">No differences. These snapshots describe the same showfile state.</p>';
    return;
  }
  out.innerHTML = result.nodes.map(renderNode).join('');
}

wire('dropA', 'fileA', 'a');
wire('dropB', 'fileB', 'b');
</script>
</body>
</html>
